<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ATS CV Compiler</title>
    <link rel="stylesheet" href="css/style.css">
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
</head>
<body>
    <div id="control-panel">
        <h2>ATS Resume Compiler</h2>
        <p>Editing source data inside <code>data/input/resume.md</code> dynamically populates the preview below.</p>
        <button onclick="window.print()">Compile & Export PDF</button>
    </div>

    <main id="resume-preview" class="ats-cv-flow"></main>

    <script src="js/app.js"></script>
</body>
</html>
